---
default_install_hook_types:
  - pre-commit

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-merge-conflict
        args: ["--assume-in-merge"]
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: trailing-whitespace
        exclude: ".(md|rst)$"
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-yaml
      - id: check-xml
      - id: check-toml
      - id: check-json
      - id: pretty-format-json
        args:
          - --autofix

  # YAML
  - repo: https://github.com/adrienverge/yamllint.git
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530  # frozen: v1.38.0
    hooks:
      - id: yamllint
        args: ["-d relaxed"]
  - repo: https://github.com/google/yamlfmt
    rev: 21ca5323a9c87ee37a434e0ca908efc0a89daa07  # frozen: v0.21.0
    hooks:
      - id: yamlfmt
        language: system

  # Lua
  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: 28e1d7b5db3f2c6c53580963c79c5e6a5b374ca0  # frozen: v2.4.0
    hooks:
      - id: stylua-system

  # EditorConfig
  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: bebfac867564fbd992e5b45379b4b0568d5cb85b  # frozen: 3.6.1
    hooks:
      - id: editorconfig-checker

  # Spelling
  - repo: https://github.com/crate-ci/typos
    rev: 02ea592e44b3a53c302f697cddca7641cd051c3d  # frozen: v1.45.0
    hooks:
      - id: typos

  # Png
  - repo: https://github.com/oxipng/oxipng
    rev: d54e7c04ea58170167d95d9b2b2ec07571602fe2  # frozen: v10.1.0
    hooks:
      - id: oxipng
        args: ["-o", "4", "--strip", "safe", "--alpha"]

  # Github action
  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # frozen: v1.7.12
    hooks:
      - id: actionlint-system
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: ea2eb407b4cbce87cf0d502f36578950494f5ac9  # frozen: v1.23.1
    hooks:
      - id: zizmor

  # Docker file
  - repo: https://github.com/AleksaC/hadolint-py
    rev: 458cb25edf664682e3e856a53a2f9af33e068297  # frozen: v2.14.0
    hooks:
      - id: hadolint
  - repo: https://github.com/reteps/dockerfmt
    rev: 21be1f69cec5e77953bdb40a2f1d95de0eeb56ac  # frozen: v0.3.9
    hooks:
      - id: dockerfmt
        args:
          - --indent=4
          - --write

  # Security
  - repo: https://github.com/Yelp/detect-secrets
    rev: 01886c8a910c64595c47f186ca1ffc0b77fa5458  # frozen: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --exclude-files
          - .pre-commit-config.yml

  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e  # frozen: v8.30.1
    hooks:
      - id: gitleaks

  # Makefile
  - repo: https://github.com/checkmake/checkmake.git
    rev: 59931d556f8f5cf4fbacf2c8390a8122ef7a881d  # frozen: v0.3.2
    hooks:
      - id: checkmake-system

  # Markdown
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: 1f1b51c57b9a051a42d04deaa725c4c9a2d37aa0  # frozen: v0.1.66
    hooks:
      - id: rumdl-fmt
        args:
          - --disable
          - MD013

  # Local tool (shellcheck / shfmt)
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        description: Test shell scripts with shellcheck
        entry: shellcheck
        language: system
        types: [shell]
        require_serial: true
        args:
          - --external-sources

      - id: shfmt
        name: shfmt
        description: Format shell scripts with shfmt
        entry: shfmt
        language: system
        types: [shell]
        args: [--write]
        exclude_types: [csh, tcsh, zsh]

      - id: luacheck
        name: Luacheck
        description: Lint and static analysis of Lua code
        entry: luacheck
        language: system
        types: [lua]
